<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
<style>.h{font-family:Arial;font-size:10;font-weight:bold;fill:#1F4E79}.l{stroke:#2E75B6;stroke-width:1.3;marker-end:url(#a)}.lr{stroke:#E53935;stroke-width:1.3;stroke-dasharray:5,3;marker-end:url(#ar)}.lg{stroke:#4CAF50;stroke-width:1.3;marker-end:url(#ag)}</style>
<defs><marker id="a" markerWidth="7" markerHeight="5" refX="3.5" refY="2.5"><polygon points="0,0 7,2.5 0,5" fill="#2E75B6"/></marker>
<marker id="ar" markerWidth="7" markerHeight="5" refX="3.5" refY="2.5"><polygon points="0,0 7,2.5 0,5" fill="#E53935"/></marker>
<marker id="ag" markerWidth="7" markerHeight="5" refX="3.5" refY="2.5"><polygon points="0,0 7,2.5 0,5" fill="#4CAF50"/></marker></defs>
<rect width="880" height="400" fill="#fff"/>
<text x="440" y="20" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1F4E79">VIP 支付 时序图</text><line x1="60" y1="48" x2="60" y2="360" stroke="#90A4AE" stroke-width="1.5"/><text x="60" y="40" text-anchor="middle" class="h">App</text><line x1="210" y1="48" x2="210" y2="360" stroke="#90A4AE" stroke-width="1.5"/><text x="210" y="40" text-anchor="middle" class="h">Vip
Service</text><line x1="400" y1="48" x2="400" y2="360" stroke="#90A4AE" stroke-width="1.5"/><text x="400" y="40" text-anchor="middle" class="h">微信支付</text><line x1="590" y1="48" x2="590" y2="360" stroke="#90A4AE" stroke-width="1.5"/><text x="590" y="40" text-anchor="middle" class="h">User
Service</text><line x1="770" y1="48" x2="770" y2="360" stroke="#90A4AE" stroke-width="1.5"/><text x="770" y="40" text-anchor="middle" class="h">推送</text><line x1="60" y1="70" x2="210" y2="70" class="l"/><text x="135" y="65" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">POST /api/vip/orders {planType}</text><rect x="162" y="98" width="96" height="18" rx="3" fill="#E3F2FD" stroke="#2E75B6" stroke-width="0.8"/><text x="210" y="111" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">创建预订单</text><line x1="210" y1="126" x2="400" y2="126" class="l"/><text x="305" y="121" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">统一下单API</text><line x1="400" y1="154" x2="210" y2="154" class="l"/><text x="305" y="149" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">预付单参数</text><line x1="210" y1="182" x2="60" y2="182" class="l"/><text x="135" y="177" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">返回支付参数</text><rect x="12" y="210" width="96" height="18" rx="3" fill="#E3F2FD" stroke="#2E75B6" stroke-width="0.8"/><text x="60" y="223" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">调起微信支付</text><rect x="40" y="238" width="80" height="20" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/><text x="80" y="252" text-anchor="middle" font-family="Arial" font-size="7" fill="#C62828">用户支付</text><line x1="400" y1="266" x2="210" y2="266" class="lr"/><text x="305" y="261" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">POST /callback 支付结果</text><rect x="162" y="294" width="96" height="18" rx="3" fill="#E3F2FD" stroke="#2E75B6" stroke-width="0.8"/><text x="210" y="307" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">验签+幂等去重</text><line x1="210" y1="322" x2="590" y2="322" class="l"/><text x="400" y="317" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">PUT vip_status=active</text><line x1="590" y1="350" x2="210" y2="350" class="l"/><text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">OK</text><rect x="162" y="378" width="96" height="18" rx="3" fill="#E3F2FD" stroke="#2E75B6" stroke-width="0.8"/><text x="210" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">更新订单状态paid</text><line x1="210" y1="406" x2="770" y2="406" class="l"/><text x="490" y="401" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">发送升级通知</text><line x1="770" y1="434" x2="60" y2="434" class="l"/><text x="415" y="429" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">App+企微推送</text></svg>