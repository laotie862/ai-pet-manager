<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
<style>.h{font-family:Arial;font-size:11;font-weight:bold;fill:#1F4E79}.t{font-family:Arial;font-size:10;fill:#333}.g{stroke:#B0BEC5;stroke-width:1;stroke-dasharray:4,3}
.l{stroke:#2E75B6;stroke-width:1.5;marker-end:url(#a)}.lr{stroke:#E53935;stroke-width:1.5;stroke-dasharray:5,3;marker-end:url(#ar)}
.box{fill:#E3F2FD;stroke:#2E75B6;stroke-width:1;rx:3}.rbox{fill:#FFCDD2;stroke:#E53935;stroke-width:1;rx:3}</style>
<defs><marker id="a" markerWidth="8" markerHeight="6" refX="4" refY="3"><polygon points="0,0 8,3 0,6" fill="#2E75B6"/></marker>
<marker id="ar" markerWidth="8" markerHeight="6" refX="4" refY="3"><polygon points="0,0 8,3 0,6" fill="#E53935"/></marker></defs>
<rect width="880" height="380" fill="#fff"/>
<text x="440" y="22" text-anchor="middle" class="h" font-size="14">用户登录时序图</text><rect x="78" y="55" width="4" height="285" fill="#90A4AE"/><rect x="248" y="55" width="4" height="285" fill="#90A4AE"/><rect x="448" y="55" width="4" height="285" fill="#90A4AE"/><rect x="648" y="55" width="4" height="285" fill="#90A4AE"/><text x="80" y="45" text-anchor="middle" class="h">App</text><text x="250" y="45" text-anchor="middle" class="h">Spring Boot</text><text x="450" y="45" text-anchor="middle" class="h">PostgreSQL</text><text x="650" y="45" text-anchor="middle" class="h">Redis</text><line x1="80" y1="80" x2="80" y2="80" class="l"/><text x="80" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">POST /api/auth/login {phone, password}</text><rect x="40" y="94" width="80" height="20" class="box"/><text x="80" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">BCrypt校验</text><line x1="80" y1="116" x2="80" y2="116" class="l"/><text x="80" y="111" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">SELECT * FROM t_user WHERE phone=?</text><rect x="40" y="138" width="80" height="20" class="box"/><text x="80" y="152" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">返回user记录</text><line x1="80" y1="160" x2="80" y2="160" class="l"/><text x="80" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">user: {id,password_hash,...}</text><rect x="40" y="182" width="80" height="20" class="box"/><text x="80" y="196" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">生成JWT Token</text><line x1="80" y1="204" x2="80" y2="204" class="l"/><text x="80" y="199" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">SET token:user:{id}:token {token}</text><line x1="80" y1="226" x2="80" y2="226" class="l"/><text x="80" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">OK</text><line x1="80" y1="248" x2="80" y2="248" class="l"/><text x="80" y="243" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">200 {accessToken,refreshToken}</text><rect x="40" y="270" width="80" height="20" class="box"/><text x="80" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">存Token,跳首页</text><text x="20" y="302" font-family="Arial" font-size="9" fill="#E53935">备选路径：密码错误→401；用户被冻结→403；验证码过期→400</text></svg>