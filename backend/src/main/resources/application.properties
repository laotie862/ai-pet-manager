spring.application.name=ai-pet-care-backend
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.flyway.locations=classpath:db/migration
spring.jackson.time-zone=UTC

logging.pattern.level=%5p [traceId=%X{traceId:-}]

petcare.service-name=AI Pet Care Backend
petcare.version=0.1.0-stage1
petcare.enabled-modules=auth,user,pet,device,behavior,notification,admin
