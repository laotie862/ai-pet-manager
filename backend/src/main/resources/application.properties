spring.application.name=ai-pet-care-backend
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.flyway.locations=classpath:db/migration
spring.jackson.time-zone=UTC

logging.pattern.level=%5p [traceId=%X{traceId:-}]

petcare.service-name=AI Pet Care Backend
petcare.version=0.4.0-stage4
petcare.enabled-modules=auth,user,pet,device,behavior,notification,admin
petcare.security.jwt-secret=${PETCARE_SECURITY_JWT_SECRET:dev-stage2-secret-change-me-please-32-bytes}
petcare.security.access-token-minutes=${PETCARE_SECURITY_ACCESS_TOKEN_MINUTES:30}
petcare.security.refresh-token-days=${PETCARE_SECURITY_REFRESH_TOKEN_DAYS:14}
petcare.security.admin-bootstrap-enabled=${PETCARE_SECURITY_ADMIN_BOOTSTRAP_ENABLED:true}
petcare.security.admin-email=${PETCARE_SECURITY_ADMIN_EMAIL:admin@example.com}
petcare.security.admin-password=${PETCARE_SECURITY_ADMIN_PASSWORD:Admin@123456}
petcare.security.admin-nickname=${PETCARE_SECURITY_ADMIN_NICKNAME:Platform Admin}
petcare.pet.free-limit=${PETCARE_FREE_PET_LIMIT:3}
petcare.storage.endpoint=${PETCARE_STORAGE_ENDPOINT:http://localhost:9000}
petcare.storage.access-key=${PETCARE_STORAGE_ACCESS_KEY:minioadmin}
petcare.storage.secret-key=${PETCARE_STORAGE_SECRET_KEY:minioadmin}
petcare.storage.bucket=${PETCARE_STORAGE_BUCKET:petcare}
petcare.storage.public-base-url=${PETCARE_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/petcare}
petcare.storage.path-prefix=${PETCARE_STORAGE_PATH_PREFIX:pet-photos}
petcare.storage.max-upload-bytes=${PETCARE_STORAGE_MAX_UPLOAD_BYTES:10485760}
petcare.storage.public-read=${PETCARE_STORAGE_PUBLIC_READ:true}
petcare.device.free-limit=${PETCARE_DEVICE_FREE_LIMIT:1}
petcare.device.ffmpeg-path=${PETCARE_DEVICE_FFMPEG_PATH:ffmpeg}
petcare.device.ffprobe-path=${PETCARE_DEVICE_FFPROBE_PATH:ffprobe}
petcare.device.connection-test-timeout-seconds=${PETCARE_DEVICE_CONNECTION_TEST_TIMEOUT_SECONDS:5}
petcare.device.connection-test-enabled=${PETCARE_DEVICE_CONNECTION_TEST_ENABLED:true}
petcare.device.mock-rtsp-enabled=${PETCARE_DEVICE_MOCK_RTSP_ENABLED:true}
petcare.device.auto-start-enabled=${PETCARE_DEVICE_AUTO_START_ENABLED:true}
petcare.device.stream-frame-rate=${PETCARE_DEVICE_STREAM_FRAME_RATE:2}
petcare.device.stream-width=${PETCARE_DEVICE_STREAM_WIDTH:640}
petcare.device.restart-delay-seconds=${PETCARE_DEVICE_RESTART_DELAY_SECONDS:3}
petcare.device.max-restart-attempts=${PETCARE_DEVICE_MAX_RESTART_ATTEMPTS:5}
petcare.device.local-webcam-name=${PETCARE_DEVICE_LOCAL_WEBCAM_NAME:}
petcare.device.status-cache-ttl-seconds=${PETCARE_DEVICE_STATUS_CACHE_TTL_SECONDS:30}
petcare.device.credential-secret=${PETCARE_DEVICE_CREDENTIAL_SECRET:dev-stage3-device-secret-change-me-32-bytes}
petcare.behavior.analysis-enabled=${PETCARE_BEHAVIOR_ANALYSIS_ENABLED:true}
petcare.behavior.analysis-interval-ms=${PETCARE_BEHAVIOR_ANALYSIS_INTERVAL_MS:10000}
petcare.behavior.cv-base-url=${PETCARE_BEHAVIOR_CV_BASE_URL:http://localhost:8000}
petcare.behavior.cv-timeout-seconds=${PETCARE_BEHAVIOR_CV_TIMEOUT_SECONDS:45}
petcare.behavior.min-confidence=${PETCARE_BEHAVIOR_MIN_CONFIDENCE:0.4}
petcare.behavior.stable-frame-count=${PETCARE_BEHAVIOR_STABLE_FRAME_COUNT:2}
petcare.behavior.quick-event-stable-frame-count=${PETCARE_BEHAVIOR_QUICK_EVENT_STABLE_FRAME_COUNT:1}
petcare.behavior.uncertain-close-frame-count=${PETCARE_BEHAVIOR_UNCERTAIN_CLOSE_FRAME_COUNT:2}
petcare.behavior.min-event-duration-seconds=${PETCARE_BEHAVIOR_MIN_EVENT_DURATION_SECONDS:3}
petcare.behavior.quick-event-min-confidence=${PETCARE_BEHAVIOR_QUICK_EVENT_MIN_CONFIDENCE:0.4}
petcare.behavior.quick-event-behaviors=${PETCARE_BEHAVIOR_QUICK_EVENT_BEHAVIORS:eating,drinking,defecating}
petcare.behavior.identity-match-enabled=${PETCARE_BEHAVIOR_IDENTITY_MATCH_ENABLED:true}
petcare.behavior.identity-match-threshold=${PETCARE_BEHAVIOR_IDENTITY_MATCH_THRESHOLD:0.75}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
