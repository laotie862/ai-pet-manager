spring.datasource.url=jdbc:h2:mem:petcare_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.autoconfigure.exclude=org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
spring.flyway.enabled=false
management.health.db.enabled=false
petcare.security.admin-bootstrap-enabled=false
