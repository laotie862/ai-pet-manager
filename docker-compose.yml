services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petcare
      POSTGRES_USER: petcare
      POSTGRES_PASSWORD: petcare123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petcare
      SPRING_DATASOURCE_USERNAME: petcare
      SPRING_DATASOURCE_PASSWORD: petcare123
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./cv-service/models:/app/models
    environment:
      MODEL_PATH: /app/models
      LOG_LEVEL: INFO
    depends_on:
      - backend

volumes:
  pgdata:
