# 训练配置
model:
  name: resnet18
  pretrained: true
  num_classes: 6

data:
  dataset_path: ../dataset/
  batch_size: 32
  image_size: [224, 224]
  augmentation: true

training:
  epochs: 50
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0001

output:
  save_dir: ./checkpoints
  export_format: onnx
